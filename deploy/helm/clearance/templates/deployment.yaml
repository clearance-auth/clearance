{{- $apiRepository := required "image.repository is required" .Values.image.repository }}
{{- $apiDigest := required "image.digest is required; deploy the signed release digest" .Values.image.digest }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: clearance-api
    app.kubernetes.io/name: clearance
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: clearance-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/runtime-config: {{ printf "%s|%s|%s|%s|%s" .Values.secrets.existingSecret .Values.env.CLEARANCE_BASE_URL .Values.env.CLEARANCE_CORS_ORIGINS .Values.env.CLEARANCE_TRUSTED_PROXY .Values.restartToken | sha256sum }}
      labels:
        app: clearance-api
        app.kubernetes.io/name: clearance
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ $apiRepository }}@{{ $apiDigest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret }}
                  key: database-url
            - name: CLEARANCE_BASE_URL
              value: {{ required "env.CLEARANCE_BASE_URL is required" .Values.env.CLEARANCE_BASE_URL | quote }}
            - name: CLEARANCE_CORS_ORIGINS
              value: {{ required "env.CLEARANCE_CORS_ORIGINS is required" .Values.env.CLEARANCE_CORS_ORIGINS | quote }}
            - name: CLEARANCE_TRUSTED_PROXY
              value: {{ .Values.env.CLEARANCE_TRUSTED_PROXY | quote }}
            - name: CLEARANCE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret }}
                  key: clearance-secret
            - name: CLEARANCE_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret }}
                  key: operator-token
            - name: CLEARANCE_CREDENTIAL_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret }}
                  key: credential-key
            - name: CLEARANCE_CREDENTIAL_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ required "secrets.existingSecret is required" .Values.secrets.existingSecret }}
                  key: credential-key-id
            - name: CLEARANCE_STRICT_SECRETS
              value: "1"
            - name: NODE_ENV
              value: production
