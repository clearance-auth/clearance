# Auto-label config for actions/labeler — Clearance layout

runtime:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/runtime/**'
          - 'packages/core/**'
          - 'packages/telemetry/**'
          - 'packages/sso/**'
          - 'packages/scim/**'
          - 'packages/*-adapter/**'
          - 'packages/test-utils/**'

product:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/clearance-auth/**'
          - 'packages/management/**'
          - 'packages/clearance-cli/**'
          - 'packages/clearance-api/**'
          - 'packages/clearance-console/**'
          - 'apps/sample-b2b/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'scripts/**'
          - 'package.json'
          - 'pnpm-workspace.yaml'
          - 'vitest.config.ts'
          - 'tsconfig*.json'
          - 'docker-compose.yml'
          - 'Dockerfile'

deploy:
  - changed-files:
      - any-glob-to-any-file:
          - 'deploy/**'
