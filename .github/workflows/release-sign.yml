# Build, verify, publish, and sign the actual Clearance release assets.
name: Clearance release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Clearance release version"
        required: true
        type: string
      recover_published_npm:
        description: "Recover signed assets after npm published but release attachment failed"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version.outputs.release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -Eeuo pipefail
          VERSION="${REQUESTED_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$ ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::error::Release version must be exact SemVer: $VERSION"
            exit 1
          else
            echo "Skipping non-release tag: $REQUESTED_VERSION"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    environment: npm-release
    env:
      RECOVER_PUBLISHED_NPM: ${{ inputs.recover_published_npm && '1' || '0' }}
    concurrency:
      group: clearance-release-v${{ needs.gate.outputs.version }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/tags/v${{ needs.gate.outputs.version }}

      - name: Checkout npm recovery verifier
        if: inputs.recover_published_npm
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.workflow_sha }}
          path: .release-tooling
          sparse-checkout: scripts/verify-npm-provenance.mjs

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Resolve version and require release signing identity
        env:
          REQUESTED_VERSION: ${{ inputs.version || github.ref_name }}
          CLEARANCE_RELEASE_SIGNING_KEY: ${{ secrets.CLEARANCE_RELEASE_SIGNING_KEY }}
        run: |
          set -Eeuo pipefail
          test -n "${CLEARANCE_RELEASE_SIGNING_KEY:-}" || {
            echo "::error::CLEARANCE_RELEASE_SIGNING_KEY is required; refusing an unsigned release"
            exit 1
          }
          VERSION="${REQUESTED_VERSION#v}"
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?(\+([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+)?$ ]] || {
            echo "::error::Release version must be exact SemVer: $VERSION"
            exit 1
          }
          test "$(git rev-parse --is-shallow-repository)" = "false" || {
            echo "::error::Release checkout must contain full history"
            exit 1
          }
          test "$(git rev-parse "refs/tags/v${VERSION}^{commit}")" = "$(git rev-parse HEAD)" || {
            echo "::error::Tag v${VERSION} must exist and resolve to the release commit"
            exit 1
          }
          [[ "$GITHUB_REPOSITORY" == "clearance-auth/clearance" ]] || {
            echo "::error::Releases must run in the canonical clearance-auth/clearance repository"
            exit 1
          }
          if [[ "$RECOVER_PUBLISHED_NPM" == "1" && "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]]; then
            echo "::error::npm recovery is available only through an explicit workflow dispatch"
            exit 1
          fi
          if [[ "$RECOVER_PUBLISHED_NPM" == "1" ]]; then
            [[ "$GITHUB_REF" == "refs/heads/main" \
              && "$GITHUB_WORKFLOW_REF" == "$GITHUB_REPOSITORY/.github/workflows/release-sign.yml@refs/heads/main" \
              && "$GITHUB_WORKFLOW_SHA" == "$GITHUB_SHA" ]] || {
              echo "::error::npm recovery must use the release workflow from the current main commit"
              exit 1
            }
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/clearance:$VERSION" >> "$GITHUB_ENV"
          echo "BACKUP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/clearance-backup:$VERSION" >> "$GITHUB_ENV"
          echo "STAGING_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/clearance:staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          echo "STAGING_BACKUP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/clearance-backup:staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Install and verify from clean source
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @clearance/e2e exec playwright install chromium
          node scripts/verify-release-version.mjs "$VERSION"
          pnpm verify:real

      - name: Pack shipping packages
        run: |
          set -Eeuo pipefail
          mkdir -p dist-release/assets
          PACKAGES=(@clearance/auth @clearance/management @clearance/cli @clearance/api)
          if [[ "$RECOVER_PUBLISHED_NPM" == "1" ]]; then
            npm install --global npm@11.5.1
            AUDIT_DIR="$(mktemp -d)"
            npm install --prefix "$AUDIT_DIR" --ignore-scripts --save-exact \
              "${PACKAGES[@]/%/@$VERSION}"
            npm audit signatures --prefix "$AUDIT_DIR" --json --include-attestations \
              > "$AUDIT_DIR/npm-audit-signatures.json"
            for PACKAGE in "${PACKAGES[@]}"; do
              npm pack "${PACKAGE}@${VERSION}" --pack-destination dist-release/assets --ignore-scripts
            done
            node .release-tooling/scripts/verify-npm-provenance.mjs \
              "$VERSION" "$(git rev-parse HEAD)" "$AUDIT_DIR/npm-audit-signatures.json" \
              dist-release/assets dist-release/assets/npm-provenance.json "${PACKAGES[@]}"
          else
            pnpm --filter @clearance/auth pack --pack-destination dist-release/assets
            pnpm --filter @clearance/management pack --pack-destination dist-release/assets
            pnpm --filter @clearance/cli pack --pack-destination dist-release/assets
            pnpm --filter @clearance/api pack --pack-destination dist-release/assets
          fi
          command -v helm >/dev/null
          helm package deploy/helm/clearance --version "$VERSION" --app-version "$VERSION" --destination dist-release/assets
          pnpm list -r --prod --json --depth Infinity > dist-release/assets/dependency-graph.json
          test "$(find dist-release/assets -name '*.tgz' | wc -l)" -eq 5
          tarball_for() {
            node -e '
              const fs=require("fs"), cp=require("child_process"), path=require("path");
              const dir=process.argv[1], wanted=process.argv[2];
              const found=fs.readdirSync(dir).filter(f=>f.endsWith(".tgz")).find(f=>{
                try {
                  const p=JSON.parse(cp.execFileSync("tar",["-xzf",path.join(dir,f),"-O","package/package.json"],{encoding:"utf8",stdio:["ignore","pipe","ignore"]}));
                  return p.name===wanted;
                } catch { return false; }
              });
              if (!found) process.exit(1);
              process.stdout.write(path.join(dir,found));
            ' dist-release/assets "$1"
          }
          node scripts/verify-release-runtime-closure.mjs "$(tarball_for '@clearance/auth')" dist-release/assets/auth-runtime-closure.json
          node scripts/verify-release-runtime-closure.mjs "$(tarball_for '@clearance/management')" dist-release/assets/management-runtime-closure.json

      - name: Build and push staging container references
        if: env.RECOVER_PUBLISHED_NPM != '1'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker buildx build --push --tag "$STAGING_IMAGE" \
            --provenance=mode=max --sbom=true \
            --label "org.opencontainers.image.version=$VERSION" \
            --label "org.opencontainers.image.revision=$SOURCE_COMMIT" \
            --metadata-file dist-release/image-metadata.json .
          DIGEST="$(node -e "const j=require('./dist-release/image-metadata.json'); process.stdout.write(j['containerimage.digest']||'')")"
          test -n "$DIGEST"
          printf '%s@%s\n' "${IMAGE%:*}" "$DIGEST" > dist-release/assets/container-image.txt
          docker buildx build --push --target backup-runtime --tag "$STAGING_BACKUP_IMAGE" \
            --provenance=mode=max --sbom=true \
            --label "org.opencontainers.image.version=$VERSION" \
            --label "org.opencontainers.image.revision=$SOURCE_COMMIT" \
            --metadata-file dist-release/backup-image-metadata.json .
          BACKUP_DIGEST="$(node -e "const j=require('./dist-release/backup-image-metadata.json'); process.stdout.write(j['containerimage.digest']||'')")"
          test -n "$BACKUP_DIGEST"
          printf '%s@%s\n' "${BACKUP_IMAGE%:*}" "$BACKUP_DIGEST" > dist-release/assets/backup-container-image.txt
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "BACKUP_DIGEST=$BACKUP_DIGEST" >> "$GITHUB_ENV"

      - name: Recover existing tag-signed container digests
        if: env.RECOVER_PUBLISHED_NPM == '1'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          recover_digest() {
            local image="$1" evidence="$2" digest
            docker pull "$image" >/dev/null
            digest="$(docker image inspect "$image" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
              | awk -F@ -v repository="${image%:*}" '$1 == repository { print $2; exit }')"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "::error::$image did not resolve to an immutable digest"
              exit 1
            }
            printf '%s@%s\n' "${image%:*}" "$digest" > "$evidence"
            printf '%s' "$digest"
          }
          DIGEST="$(recover_digest "$IMAGE" dist-release/assets/container-image.txt)"
          BACKUP_DIGEST="$(recover_digest "$BACKUP_IMAGE" dist-release/assets/backup-container-image.txt)"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "BACKUP_DIGEST=$BACKUP_DIGEST" >> "$GITHUB_ENV"

      - name: Verify recovered immutable container signatures
        if: env.RECOVER_PUBLISHED_NPM == '1'
        run: |
          set -Eeuo pipefail
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-sign.yml@refs/tags/v${VERSION}"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE%:*}@${DIGEST}" >/dev/null
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${BACKUP_IMAGE%:*}@${BACKUP_DIGEST}" >/dev/null

      - name: Sign package and container-digest bundle
        env:
          CLEARANCE_RELEASE_SIGNING_KEY: ${{ secrets.CLEARANCE_RELEASE_SIGNING_KEY }}
          CLEARANCE_RELEASE_ASSET_DIR: ${{ github.workspace }}/dist-release/assets
          CLEARANCE_REQUIRE_RELEASE_ASSETS: "1"
          CLEARANCE_REQUIRE_TAG_BINDING: "1"
          CLEARANCE_VERSION: ${{ env.VERSION }}
        run: bash scripts/sign-release.sh "${{ github.workspace }}/dist-release"

      - name: Verify detached signature and asset manifest
        run: |
          set -Eeuo pipefail
          openssl dgst -sha256 -verify dist-release/release-public.pem \
            -signature dist-release/release-bundle.sig dist-release/release-bundle.txt
          (cd dist-release/assets && sha256sum --check ../assets.sha256)

      - name: Keyless-sign and verify immutable container digests
        if: env.RECOVER_PUBLISHED_NPM != '1'
        run: |
          set -Eeuo pipefail
          PRIMARY_REF="${IMAGE%:*}@${DIGEST}"
          BACKUP_REF="${BACKUP_IMAGE%:*}@${BACKUP_DIGEST}"
          cosign sign --yes "$PRIMARY_REF"
          cosign sign --yes "$BACKUP_REF"
          IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-sign.yml@refs/tags/v${VERSION}"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com "$PRIMARY_REF" >/dev/null
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com "$BACKUP_REF" >/dev/null

      - name: Create final release tags from verified digests
        if: env.RECOVER_PUBLISHED_NPM != '1'
        run: |
          set -Eeuo pipefail
          docker buildx imagetools create --tag "$IMAGE" "${IMAGE%:*}@${DIGEST}"
          docker buildx imagetools create --tag "$BACKUP_IMAGE" "${BACKUP_IMAGE%:*}@${BACKUP_DIGEST}"

      - name: Verify both published container tags match the signed digests
        run: |
          set -Eeuo pipefail
          verify_tag_digest() {
            local image="$1" evidence="$2" repository expected actual
            repository="${image%:*}"
            expected="$(sed -n 's/^.*@\(sha256:[0-9a-f]\{64\}\)$/\1/p' "$evidence")"
            [[ -n "$expected" ]] || {
              echo "::error::Signed container evidence has an invalid digest: $evidence"
              exit 1
            }
            docker pull "$image"
            actual="$(docker image inspect "$image" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
              | awk -F@ -v repository="$repository" '$1 == repository { print $2; exit }')"
            [[ "$actual" == "$expected" ]] || {
              echo "::error::$image resolves to ${actual:-no digest}; signed digest is $expected"
              exit 1
            }
          }
          verify_tag_digest "$IMAGE" dist-release/assets/container-image.txt
          verify_tag_digest "$BACKUP_IMAGE" dist-release/assets/backup-container-image.txt

      - name: Publish public npm packages with trusted provenance
        if: env.RECOVER_PUBLISHED_NPM != '1'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -Eeuo pipefail
          npm install --global npm@11.5.1
          test "$(npm config get registry)" = "https://registry.npmjs.org/"
          tarball_for() {
            node -e '
              const fs=require("fs"), cp=require("child_process"), path=require("path");
              const dir=process.argv[1], wanted=process.argv[2];
              const found=fs.readdirSync(dir).filter(f=>f.endsWith(".tgz")).find(f=>{
                try {
                  const p=JSON.parse(cp.execFileSync("tar",["-xzf",path.join(dir,f),"-O","package/package.json"],{encoding:"utf8",stdio:["ignore","pipe","ignore"]}));
                  return p.name===wanted;
                } catch { return false; }
              });
              if (!found) process.exit(1);
              process.stdout.write(path.join(dir,found));
            ' dist-release/assets "$1"
          }
          integrity_for() {
            node -e '
              const fs=require("fs"), crypto=require("crypto");
              process.stdout.write("sha512-"+crypto.createHash("sha512").update(fs.readFileSync(process.argv[1])).digest("base64"));
            ' "$1"
          }
          registry_status() {
            local package="$1" encoded response status
            encoded="$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1]))' "$package")"
            response="dist-release/npm-registry-response.json"
            for ATTEMPT in {1..120}; do
              status="$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
                "https://registry.npmjs.org/${encoded}/${VERSION}" || true)"
              case "$status" in
                200|404) printf '%s' "$status"; return 0 ;;
                000|429|5??)
                  echo "Waiting for a conclusive registry response for ${package}@${VERSION} (${ATTEMPT}/120)..." >&2
                  sleep 5
                  ;;
                *)
                  echo "::error::Registry returned HTTP $status for ${package}@${VERSION}" >&2
                  return 1
                  ;;
              esac
            done
            echo "::error::Registry did not return a conclusive response for ${package}@${VERSION}" >&2
            return 1
          }
          for PACKAGE in @clearance/auth @clearance/management @clearance/cli @clearance/api; do
            STATUS="$(registry_status "$PACKAGE")"
            [[ "$STATUS" == "404" ]] || {
              echo "::error::${PACKAGE}@${VERSION} already exists; use the explicit provenance-verified recovery path"
              exit 1
            }
          done
          for PACKAGE in @clearance/auth @clearance/management @clearance/cli @clearance/api; do
            npm publish "$(tarball_for "$PACKAGE")" --access public --provenance
          done
          for PACKAGE in @clearance/auth @clearance/management @clearance/cli @clearance/api; do
            TARBALL="$(tarball_for "$PACKAGE")"
            EXPECTED_INTEGRITY="$(integrity_for "$TARBALL")"
            PUBLISHED_INTEGRITY=""
            for ATTEMPT in {1..120}; do
              if PUBLISHED_INTEGRITY="$(npm view "${PACKAGE}@${VERSION}" dist.integrity --json 2>/dev/null | tr -d '"\n')" \
                && [[ -n "$PUBLISHED_INTEGRITY" ]]; then
                break
              fi
              echo "Waiting for ${PACKAGE}@${VERSION} to propagate (${ATTEMPT}/120)..."
              sleep 5
            done
            [[ -n "$PUBLISHED_INTEGRITY" ]] || {
              echo "::error::${PACKAGE}@${VERSION} did not become readable from the public registry"
              exit 1
            }
            [[ "$PUBLISHED_INTEGRITY" == "$EXPECTED_INTEGRITY" ]] || {
              echo "::error::${PACKAGE}@${VERSION} failed final registry integrity verification"
              exit 1
            }
          done

      - name: Upload signed release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clearance-${{ env.VERSION }}-signed
          path: dist-release/
          if-no-files-found: error

      - name: Attach signed assets to tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || env.RECOVER_PUBLISHED_NPM == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          RELEASE_TAG="v${VERSION}"
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --generate-notes
          mapfile -d '' FILES < <(find dist-release -type f -print0)
          test "${#FILES[@]}" -gt 0
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq .id)"
          EXISTING_ASSETS="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets")"
          declare -A NAMES=()
          for FILE in "${FILES[@]}"; do
            NAME="$(basename "$FILE")"
            [[ -z "${NAMES[$NAME]:-}" ]] || {
              echo "::error::Release bundle contains duplicate asset name $NAME"
              exit 1
            }
            NAMES[$NAME]=1
            mapfile -t MATCHES < <(jq -r --arg name "$NAME" '.[] | select(.name == $name) | [.id, (.digest // "")] | @tsv' <<<"$EXISTING_ASSETS")
            [[ "${#MATCHES[@]}" -le 1 ]] || {
              echo "::error::Release already contains duplicate asset name $NAME"
              exit 1
            }
            EXPECTED="sha256:$(sha256sum "$FILE" | awk '{print $1}')"
            if [[ "${#MATCHES[@]}" -eq 1 ]]; then
              IFS=$'\t' read -r _ ACTUAL <<<"${MATCHES[0]}"
              [[ "$ACTUAL" == "$EXPECTED" ]] || {
                echo "::error::Existing release asset $NAME has digest ${ACTUAL:-missing}; expected $EXPECTED"
                exit 1
              }
              echo "Existing release asset $NAME matches; skipping."
            else
              gh release upload "$RELEASE_TAG" "$FILE"
            fi
          done
