# Clearance stack smoke (replaces inherited Clearance e2e matrix).
# Full Compose path exercises Postgres + API + console + sample app.
name: E2E

on:
  push:
    branches: [main, next]
  merge_group:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  stack-smoke:
    name: Compose stack smoke
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: packages/clearance-e2e
          browsers: chromium

      - name: Build
        run: pnpm build

      - name: Host local smoke (no Docker apps)
        run: pnpm smoke

      - name: Compose stack smoke
        run: pnpm stack:smoke

  e2e:
    runs-on: ubuntu-latest
    needs: [stack-smoke]
    if: always()
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
