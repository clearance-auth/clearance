version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    versioning-strategy: increase
    cooldown:
      default-days: 7
      semver-major-days: 5
    groups:
      workspace-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
