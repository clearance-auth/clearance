name: 💡 Feature request
description: Suggest a new feature or idea
type: Feature
body:
  - type: checkboxes
    attributes:
      label: Is this suited for GitHub?
      description: Use GitHub issues for product and CLI feature requests for Clearance.
      options:
        - label: Yes, this is suited for GitHub
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for Clearance!

        - If you have a bug report, please use the bug report form instead.
        - Before opening a feature request, please check for existing issues and :+1: upvote the existing request instead.
  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen. Prefer CLI + API + console parity.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
